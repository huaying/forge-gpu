# Vortex Ring — 50K particles swirling in a torus
# Particles orbit around Y axis with radial confinement to form a ring.
# Run: forge run examples/vortex-ring.toml

[simulation]
name = "vortex-ring"
type = "particles"
dt = 0.001
substeps = 2
duration = 2.0
count = 50000

# Initialize particles in a torus-like region
[[fields]]
name = "position"
type = "vec3f"
count = 50000
init = { type = "random", min = [-2.0, 0.5, -2.0], max = [2.0, 1.5, 2.0] }

[[fields]]
name = "velocity"
type = "vec3f"
init = { type = "zero" }

# Vortex force with strong radial confinement:
#   tangential: cross(up, pos) * omega  (spin around Y)
#   radial: pull toward radius ~1.5 in XZ plane
#   vertical: pull toward Y=1.0
[[forces]]
type = "custom"
expr = "vel.x += (-pos.z * 3.0 - pos.x * 2.0) * dt; vel.z += (pos.x * 3.0 - pos.z * 2.0) * dt; vel.y += (1.0 - pos.y) * 4.0 * dt"

# Damping to dissipate energy and maintain stable ring
[[forces]]
type = "drag"
coefficient = 2.0

# Ground plane to catch stragglers
[[constraints]]
type = "ground_plane"
y = -1.0
restitution = 0.3
