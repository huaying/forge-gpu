# Waterfall — 100K water particles pouring onto obstacles
# Water column pours from top, hits a sphere shelf, splashes, pools at bottom.
# Run: forge run examples/waterfall.toml

[simulation]
name = "waterfall"
type = "particles"
dt = 0.0001
substeps = 10
duration = 3.0
count = 100000

[[fields]]
name = "position"
type = "vec3f"
count = 100000
init = { type = "random", min = [-0.2, 3.0, -0.2], max = [0.2, 4.0, 0.2] }

[[fields]]
name = "velocity"
type = "vec3f"
init = { type = "zero" }

[spatial]
type = "hashgrid"
cell_size = 0.04
grid_dims = [75, 125, 75]

# SPH forces (fused: density + pressure + viscosity)
[[forces]]
type = "sph_density"
smoothing_radius = 0.02

[[forces]]
type = "sph_pressure"
gas_constant = 2000.0
rest_density = 1000.0

[[forces]]
type = "sph_viscosity"
coefficient = 0.01

[[forces]]
type = "gravity"
value = [0.0, -9.81, 0.0]

# Ground plane at y=0 — water pools here
[[constraints]]
type = "ground_plane"
y = 0.0
restitution = 0.2

# Sphere obstacle at y=1.5 — acts as a shelf/rock the water splashes off
[[constraints]]
type = "sphere"
center = [0.0, 1.5, 0.0]
radius = 0.6
restitution = 0.3

# Container box to keep particles in bounds
[[constraints]]
type = "box"
min = [-2.0, 0.0, -2.0]
max = [2.0, 5.0, 2.0]
restitution = 0.1
