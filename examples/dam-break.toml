# Dam Break — 50K water particles in a box
# Classic SPH fluid benchmark: water column collapses under gravity
# Run: forge run examples/dam-break.toml

[simulation]
name = "dam-break"
type = "particles"
dt = 0.0001
substeps = 10
duration = 2.0
count = 50000

[[fields]]
name = "position"
type = "vec3f"
count = 50000
init = { type = "random", min = [0.0, 0.0, 0.0], max = [1.0, 2.0, 0.5] }

[[fields]]
name = "velocity"
type = "vec3f"
init = { type = "zero" }

[spatial]
type = "hashgrid"
cell_size = 0.05
grid_dims = [40, 60, 20]

# SPH forces (order matters: density first, then pressure + viscosity)
[[forces]]
type = "sph_density"
smoothing_radius = 0.025

[[forces]]
type = "sph_pressure"
gas_constant = 2000.0
rest_density = 1000.0

[[forces]]
type = "sph_viscosity"
coefficient = 0.01

[[forces]]
type = "gravity"
value = [0.0, -9.81, 0.0]

# Container box
[[constraints]]
type = "box"
min = [-0.1, 0.0, -0.1]
max = [2.0, 3.0, 0.6]
restitution = 0.3
