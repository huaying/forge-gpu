# Vortex — Custom force field using expressions
# Particles orbit in a vortex pattern, no code needed
# Run: forge run examples/vortex.toml

[simulation]
name = "vortex"
type = "particles"
dt = 0.001
substeps = 1
duration = 5.0
count = 10000

[[fields]]
name = "position"
type = "vec3f"
count = 10000
init = { type = "random", min = [-2.0, 0.0, -2.0], max = [2.0, 4.0, 2.0] }

[[fields]]
name = "velocity"
type = "vec3f"
init = { type = "zero" }

# Vortex force: tangential rotation around Y axis + radial pull toward r=1.5
# cross(up, pos) gives tangential direction; -(r - r0)*pos/r gives radial restore
# This creates a stable orbit instead of exponential spiral
[[forces]]
type = "custom"
expr = "vel.x += (-pos.z * 2.0 - pos.x * 1.0) * dt; vel.z += (pos.x * 2.0 - pos.z * 1.0) * dt; vel.y += (-2.0 * pos.y + 2.0) * dt"

# Strong damping to stabilize the orbit
[[forces]]
type = "drag"
coefficient = 1.5

[[constraints]]
type = "ground_plane"
y = 0.0
restitution = 0.3
