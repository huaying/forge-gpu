<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>🔥 Forge Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.6;
  }
  #hud .title { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  #hud .stat { color: #aaa; }
  #hud .val { color: #4fc3f7; }
  #status { color: #ffb74d; }
</style>
</head>
<body>
<div id="hud">
  <div class="title">🔥 Forge</div>
  <div><span class="stat">Particles:</span> <span class="val" id="count">-</span></div>
  <div><span class="stat">Frame:</span> <span class="val" id="frame">-</span></div>
  <div><span class="stat">FPS:</span> <span class="val" id="fps">-</span></div>
  <div id="status">Connecting...</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Scene setup ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.fog = new THREE.FogExp2(0x111111, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(3, 4, 5);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ── Lighting ──
scene.add(new THREE.AmbientLight(0x404060, 1.0));
const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// ── Grid floor ──
const grid = new THREE.GridHelper(20, 20, 0x333333, 0x222222);
scene.add(grid);

// ── Particles ──
let particleCount = 0;
let geometry = null;
let points = null;

function initParticles(count) {
  if (points) scene.remove(points);

  particleCount = count;
  geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const material = new THREE.PointsMaterial({
    size: 0.03,
    vertexColors: true,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.85,
  });

  points = new THREE.Points(geometry, material);
  scene.add(points);
}

function updateParticles(positionData) {
  if (!geometry) return;
  const posAttr = geometry.getAttribute('position');
  const colAttr = geometry.getAttribute('color');
  const pos = posAttr.array;
  const col = colAttr.array;

  // Update positions and compute velocity-based colors
  for (let i = 0; i < particleCount; i++) {
    const x = positionData[i * 3];
    const y = positionData[i * 3 + 1];
    const z = positionData[i * 3 + 2];

    // Velocity approximation from position delta (use height as proxy)
    const speed = Math.sqrt(x * x + z * z) * 0.2 + y * 0.1;
    const t = Math.min(speed, 1.0);

    // Color: blue (slow) → cyan → white (fast)
    col[i * 3]     = 0.2 + t * 0.8;  // R
    col[i * 3 + 1] = 0.4 + t * 0.6;  // G
    col[i * 3 + 2] = 0.9;             // B

    pos[i * 3]     = x;
    pos[i * 3 + 1] = y;
    pos[i * 3 + 2] = z;
  }

  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
  geometry.computeBoundingSphere();
}

// ── WebSocket ──
const wsPort = parseInt(location.port) + 1;
const wsUrl = `ws://${location.hostname}:${wsPort}`;
let ws = null;
let frameCount = 0;
let lastFpsTime = performance.now();
let fpsFrames = 0;

function connect() {
  document.getElementById('status').textContent = 'Connecting...';
  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    document.getElementById('status').textContent = '🟢 Connected';
    document.getElementById('status').style.color = '#66bb6a';
  };

  ws.onmessage = (event) => {
    const buf = new DataView(event.data);
    const frameNum = buf.getUint32(0, true);
    const count = buf.getUint32(4, true);

    if (count !== particleCount) {
      initParticles(count);
    }

    // Read positions
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) {
      positions[i] = buf.getFloat32(8 + i * 4, true);
    }
    updateParticles(positions);

    frameCount = frameNum;
    fpsFrames++;

    document.getElementById('count').textContent = count.toLocaleString();
    document.getElementById('frame').textContent = frameNum.toLocaleString();
  };

  ws.onclose = () => {
    document.getElementById('status').textContent = '⏹ Simulation ended';
    document.getElementById('status').style.color = '#aaa';
  };

  ws.onerror = () => {
    document.getElementById('status').textContent = '🔴 Disconnected';
    document.getElementById('status').style.color = '#ef5350';
    setTimeout(connect, 2000);
  };
}

connect();

// ── Render loop ──
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);

  // FPS counter
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    document.getElementById('fps').textContent = fpsFrames;
    fpsFrames = 0;
    lastFpsTime = now;
  }
}
animate();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
