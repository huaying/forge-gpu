<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>🔥 Forge Viewer</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #111; color: #fff; font-family: monospace; overflow: hidden; }
  canvas { display: block; }
  #hud { position: fixed; top: 10px; left: 10px; font-size: 14px; z-index: 10; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 6px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">🔥 Forge | <span id="status">Loading...</span></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

// Camera
let camTheta = 0.5, camPhi = 0.3, camDist = 15;
let camTarget = [0, 4, 0];
let dragging = false, lastMouse = [0, 0];

canvas.addEventListener('mousedown', e => { dragging = true; lastMouse = [e.clientX, e.clientY]; });
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  camTheta -= (e.clientX - lastMouse[0]) * 0.005;
  camPhi = Math.max(-1.2, Math.min(1.2, camPhi + (e.clientY - lastMouse[1]) * 0.005));
  lastMouse = [e.clientX, e.clientY];
});
canvas.addEventListener('wheel', e => { camDist = Math.max(1, Math.min(50, camDist * (e.deltaY > 0 ? 1.1 : 0.9))); e.preventDefault(); }, {passive:false});

function drawScene(positions, count, frameLabel) {
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, w, h);

  if (!positions || count === 0) return;

  // Find bounds
  let xMin=1e9, xMax=-1e9, yMin=1e9, yMax=-1e9;
  for (let i = 0; i < count; i++) {
    const x = positions[i*3], y = positions[i*3+1];
    if (x < xMin) xMin = x; if (x > xMax) xMax = x;
    if (y < yMin) yMin = y; if (y > yMax) yMax = y;
  }
  // Add padding
  const pad = 1.0;
  xMin -= pad; xMax += pad; yMin -= pad; yMax += pad;
  const xRange = Math.max(xMax - xMin, 0.1);
  const yRange = Math.max(yMax - yMin, 0.1);

  // Scale to fit screen (maintain aspect ratio)
  const scale = Math.min(w / xRange, h / yRange) * 0.85;
  const cx = w / 2, cy = h / 2;
  const midX = (xMin + xMax) / 2, midY = (yMin + yMax) / 2;

  // Draw ground line
  const groundY = cy - (0 - midY) * scale;
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(w, groundY);
  ctx.stroke();

  // Draw particles as circles (XY view, ignore Z)
  for (let idx = 0; idx < count; idx++) {
    const px = positions[idx*3];
    const py = positions[idx*3+1];

    const sx = cx + (px - midX) * scale;
    const sy = cy - (py - midY) * scale;  // flip Y

    // Color by height
    const t = Math.max(0, Math.min(1, (py - yMin) / yRange));
    const r = Math.floor(30 + 80 * (1-t));
    const g = Math.floor(100 + 155 * t);
    const b = Math.floor(180 + 75 * t);

    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 3, 0, 6.28);
    ctx.fill();
  }

  // HUD bottom
  ctx.fillStyle = '#fff';
  ctx.font = '20px monospace';
  ctx.fillText(frameLabel + `  Y: ${yMin.toFixed(1)} ~ ${yMax.toFixed(1)}`, 10, h - 10);
}

// Main loop: fetch frame → draw → next frame
async function main() {
  // Wait for simulation
  let info = {frames: 0, complete: false};
  while (info.frames === 0) {
    try {
      const r = await fetch('/info?t=' + Date.now());
      info = await r.json();
    } catch(e) {}
    if (info.frames === 0) {
      drawScene(null, 0, 'Waiting for simulation...');
      await new Promise(r => setTimeout(r, 500));
    }
  }

  document.getElementById('status').textContent = `${info.frames} frames ready`;

  // Playback loop
  let frameIdx = 0;
  while (true) {
    try {
      const resp = await fetch(`/frame/${frameIdx}?t=` + Date.now());
      if (resp.ok) {
        const buf = await resp.arrayBuffer();
        const dv = new DataView(buf);
        const count = dv.getUint32(4, true);
        const pos = new Float32Array(buf, 8, count * 3);

        // Draw immediately
        drawScene(pos, count, `Frame ${frameIdx + 1}/${info.frames}  Particles: ${count}`);
        document.getElementById('status').textContent = `▶ ${frameIdx+1}/${info.frames}`;
      }
    } catch(e) {}

    frameIdx++;
    if (frameIdx >= info.frames) frameIdx = 0;

    // Wait ~60ms between frames (≈15fps)
    await new Promise(r => setTimeout(r, 60));
  }
}

main();
</script>
</body>
</html>
