<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>🔥 Forge Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.6; pointer-events: none;
  }
  #hud .title { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  #hud .stat { color: #aaa; }
  #hud .val { color: #4fc3f7; }
  #status { color: #ffb74d; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div class="title">🔥 Forge</div>
  <div><span class="stat">Particles:</span> <span class="val" id="count">-</span></div>
  <div><span class="stat">Frame:</span> <span class="val" id="frame">-</span></div>
  <div><span class="stat">FPS:</span> <span class="val" id="fps">-</span></div>
  <div id="status">Connecting...</div>
</div>

<script>
// ── WebGL Setup ──
const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl', { antialias: true, alpha: false });
if (!gl) { document.body.innerHTML = '<h1 style="color:red;padding:40px">WebGL not supported</h1>'; throw 'no webgl'; }

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

// ── Shaders ──
const vsSource = `
  attribute vec3 aPosition;
  uniform mat4 uProjection;
  uniform mat4 uView;
  uniform float uPointSize;
  uniform vec2 uYRange;   // [yMin, yMax]
  varying float vHeight;
  varying float vDepth;
  void main() {
    vec4 viewPos = uView * vec4(aPosition, 1.0);
    gl_Position = uProjection * viewPos;
    vDepth = -viewPos.z;
    // Normalized height for coloring
    float range = max(uYRange.y - uYRange.x, 0.01);
    vHeight = clamp((aPosition.y - uYRange.x) / range, 0.0, 1.0);
    // Size attenuation
    gl_PointSize = uPointSize * (600.0 / max(vDepth, 0.5));
  }
`;

const fsSource = `
  precision mediump float;
  varying float vHeight;
  varying float vDepth;
  void main() {
    // Discard corners for round points
    vec2 c = gl_PointCoord - 0.5;
    if (dot(c, c) > 0.25) discard;
    // Cool-to-warm color ramp (blue → cyan → white)
    vec3 lo = vec3(0.2, 0.47, 0.78);   // deep blue
    vec3 mid = vec3(0.31, 0.76, 0.97);  // cyan
    vec3 hi = vec3(0.95, 0.95, 1.0);    // near-white
    vec3 col = vHeight < 0.5
      ? mix(lo, mid, vHeight * 2.0)
      : mix(mid, hi, (vHeight - 0.5) * 2.0);
    // Soft depth fade
    float fog = clamp(1.0 - vDepth / 40.0, 0.3, 1.0);
    gl_FragColor = vec4(col * fog, 1.0);
  }
`;

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = compileShader(vsSource, gl.VERTEX_SHADER);
const fs = compileShader(fsSource, gl.FRAGMENT_SHADER);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

const aPosition = gl.getAttribLocation(prog, 'aPosition');
const uProjection = gl.getUniformLocation(prog, 'uProjection');
const uView = gl.getUniformLocation(prog, 'uView');
const uPointSize = gl.getUniformLocation(prog, 'uPointSize');
const uYRange = gl.getUniformLocation(prog, 'uYRange');

// ── Buffers ──
const posBuf = gl.createBuffer();
gl.enableVertexAttribArray(aPosition);

// Grid buffer (floor lines)
const gridBuf = gl.createBuffer();
const gridVerts = [];
for (let i = -5; i <= 5; i++) {
  gridVerts.push(i, 0, -5, i, 0, 5);   // Z lines
  gridVerts.push(-5, 0, i, 5, 0, i);   // X lines
}
const gridData = new Float32Array(gridVerts);
gl.bindBuffer(gl.ARRAY_BUFFER, gridBuf);
gl.bufferData(gl.ARRAY_BUFFER, gridData, gl.STATIC_DRAW);

// Grid shader (simple single-color)
const gridVS = `
  attribute vec3 aPosition;
  uniform mat4 uProjection;
  uniform mat4 uView;
  void main() {
    gl_Position = uProjection * uView * vec4(aPosition, 1.0);
  }
`;
const gridFS = `
  precision mediump float;
  void main() { gl_FragColor = vec4(0.15, 0.15, 0.15, 1.0); }
`;
const gvs = compileShader(gridVS, gl.VERTEX_SHADER);
const gfs = compileShader(gridFS, gl.FRAGMENT_SHADER);
const gridProg = gl.createProgram();
gl.attachShader(gridProg, gvs);
gl.attachShader(gridProg, gfs);
gl.linkProgram(gridProg);
const gridAPos = gl.getAttribLocation(gridProg, 'aPosition');
const gridUProj = gl.getUniformLocation(gridProg, 'uProjection');
const gridUView = gl.getUniformLocation(gridProg, 'uView');

// ── Camera (orbit) ──
let camTheta = 0.5;   // horizontal angle
let camPhi = 0.4;     // vertical angle
let camDist = 6.0;
let camTarget = [0, 1, 0];
let dragging = false;
let lastMouse = [0, 0];

canvas.addEventListener('mousedown', e => { dragging = true; lastMouse = [e.clientX, e.clientY]; });
canvas.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('mouseleave', () => dragging = false);
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  camTheta -= (e.clientX - lastMouse[0]) * 0.005;
  camPhi += (e.clientY - lastMouse[1]) * 0.005;
  camPhi = Math.max(-1.4, Math.min(1.4, camPhi));
  lastMouse = [e.clientX, e.clientY];
});
canvas.addEventListener('wheel', e => {
  camDist *= e.deltaY > 0 ? 1.1 : 0.9;
  camDist = Math.max(0.5, Math.min(50, camDist));
  e.preventDefault();
}, { passive: false });

// Touch support
let lastTouch = null;
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    lastTouch = [e.touches[0].clientX, e.touches[0].clientY];
  } else if (e.touches.length === 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && lastTouch) {
    camTheta -= (e.touches[0].clientX - lastTouch[0]) * 0.005;
    camPhi += (e.touches[0].clientY - lastTouch[1]) * 0.005;
    camPhi = Math.max(-1.4, Math.min(1.4, camPhi));
    lastTouch = [e.touches[0].clientX, e.touches[0].clientY];
  } else if (e.touches.length === 2 && lastTouchDist) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    camDist *= lastTouchDist / dist;
    camDist = Math.max(0.5, Math.min(50, camDist));
    lastTouchDist = dist;
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => { lastTouch = null; lastTouchDist = null; });

// ── Matrix helpers ──
function perspective(fovy, aspect, near, far) {
  const f = 1.0 / Math.tan(fovy / 2);
  const nf = 1 / (near - far);
  return new Float32Array([
    f/aspect, 0, 0, 0,
    0, f, 0, 0,
    0, 0, (far+near)*nf, -1,
    0, 0, 2*far*near*nf, 0
  ]);
}

function lookAt(eye, center, up) {
  const zx = eye[0]-center[0], zy = eye[1]-center[1], zz = eye[2]-center[2];
  let len = 1/Math.sqrt(zx*zx+zy*zy+zz*zz);
  const z0=zx*len, z1=zy*len, z2=zz*len;
  const xx=up[1]*z2-up[2]*z1, xy=up[2]*z0-up[0]*z2, xz=up[0]*z1-up[1]*z0;
  len=1/Math.sqrt(xx*xx+xy*xy+xz*xz);
  const x0=xx*len, x1=xy*len, x2=xz*len;
  const y0=z1*x2-z2*x1, y1=z2*x0-z0*x2, y2=z0*x1-z1*x0;
  return new Float32Array([
    x0,y0,z0,0,
    x1,y1,z1,0,
    x2,y2,z2,0,
    -(x0*eye[0]+x1*eye[1]+x2*eye[2]),
    -(y0*eye[0]+y1*eye[1]+y2*eye[2]),
    -(z0*eye[0]+z1*eye[1]+z2*eye[2]),
    1
  ]);
}

// ── Particle data ──
let positions = null;
let particleCount = 0;
let yMin = 0, yMax = 4;

// ── Render loop ──
gl.clearColor(0.067, 0.067, 0.067, 1.0);
gl.enable(gl.DEPTH_TEST);
gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

function render() {
  requestAnimationFrame(render);

  const aspect = canvas.width / canvas.height;
  const proj = perspective(Math.PI / 3, aspect, 0.1, 100.0);

  const eyeX = camTarget[0] + camDist * Math.cos(camPhi) * Math.sin(camTheta);
  const eyeY = camTarget[1] + camDist * Math.sin(camPhi);
  const eyeZ = camTarget[2] + camDist * Math.cos(camPhi) * Math.cos(camTheta);
  const view = lookAt([eyeX, eyeY, eyeZ], camTarget, [0, 1, 0]);

  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  // Draw grid
  gl.useProgram(gridProg);
  gl.uniformMatrix4fv(gridUProj, false, proj);
  gl.uniformMatrix4fv(gridUView, false, view);
  gl.bindBuffer(gl.ARRAY_BUFFER, gridBuf);
  gl.enableVertexAttribArray(gridAPos);
  gl.vertexAttribPointer(gridAPos, 3, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.LINES, 0, gridData.length / 3);
  gl.disableVertexAttribArray(gridAPos);

  // Draw particles
  if (positions && particleCount > 0) {
    gl.useProgram(prog);
    gl.uniformMatrix4fv(uProjection, false, proj);
    gl.uniformMatrix4fv(uView, false, view);
    gl.uniform1f(uPointSize, 3.0);
    gl.uniform2f(uYRange, yMin, yMax);

    gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
    gl.bufferData(gl.ARRAY_BUFFER, positions, gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(aPosition);
    gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, 0, 0);

    gl.drawArrays(gl.POINTS, 0, particleCount);
  }
}
render();

// ── WebSocket ──
const wsUrl = `ws://${location.host}`;
let ws = null;
let fpsCount = 0;

function connect() {
  document.getElementById('status').textContent = `Connecting to ${wsUrl}...`;
  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    document.getElementById('status').textContent = '🟢 Connected (WebGL)';
    document.getElementById('status').style.color = '#66bb6a';
  };

  ws.onmessage = (event) => {
    const buf = new DataView(event.data);
    const frameNum = buf.getUint32(0, true);
    const count = buf.getUint32(4, true);

    particleCount = count;
    positions = new Float32Array(event.data, 8, count * 3);

    // Track Y range for coloring
    let mn = Infinity, mx = -Infinity;
    for (let i = 0; i < count; i++) {
      const y = positions[i * 3 + 1];
      if (y < mn) mn = y;
      if (y > mx) mx = y;
    }
    yMin = mn;
    yMax = mx;

    fpsCount++;
    document.getElementById('count').textContent = count.toLocaleString();
    document.getElementById('frame').textContent = frameNum.toLocaleString();
  };

  ws.onclose = () => {
    document.getElementById('status').textContent = '⏹ Simulation ended';
    document.getElementById('status').style.color = '#aaa';
  };

  ws.onerror = () => {
    document.getElementById('status').textContent = '🔴 Disconnected';
    document.getElementById('status').style.color = '#ef5350';
    setTimeout(connect, 2000);
  };
}

connect();

setInterval(() => {
  document.getElementById('fps').textContent = fpsCount;
  fpsCount = 0;
}, 1000);
</script>
</body>
</html>
