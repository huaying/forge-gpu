<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>🔥 Forge Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.6;
  }
  #hud .title { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  #hud .stat { color: #aaa; }
  #hud .val { color: #4fc3f7; }
  #status { color: #ffb74d; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div class="title">🔥 Forge</div>
  <div><span class="stat">Particles:</span> <span class="val" id="count">-</span></div>
  <div><span class="stat">Frame:</span> <span class="val" id="frame">-</span></div>
  <div><span class="stat">FPS:</span> <span class="val" id="fps">-</span></div>
  <div id="status">Connecting...</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Resize canvas to window
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Camera state (simple orbit via mouse drag)
let camAngleX = 0.5;   // rotation around Y axis
let camAngleY = 0.4;   // tilt
let camZoom = 5.0;
let dragging = false;
let lastMouse = { x: 0, y: 0 };

canvas.addEventListener('mousedown', (e) => { dragging = true; lastMouse = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  camAngleX += (e.clientX - lastMouse.x) * 0.005;
  camAngleY += (e.clientY - lastMouse.y) * 0.005;
  camAngleY = Math.max(-1.5, Math.min(1.5, camAngleY));
  lastMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('wheel', (e) => {
  camZoom *= e.deltaY > 0 ? 1.1 : 0.9;
  camZoom = Math.max(0.5, Math.min(50, camZoom));
});

// Particle data
let positions = null;
let particleCount = 0;

function project(x, y, z) {
  // Rotate around Y axis
  const cosA = Math.cos(camAngleX), sinA = Math.sin(camAngleX);
  const rx = x * cosA - z * sinA;
  const rz = x * sinA + z * cosA;

  // Tilt
  const cosB = Math.cos(camAngleY), sinB = Math.sin(camAngleY);
  const ry = y * cosB - rz * sinB;
  const rz2 = y * sinB + rz * cosB;

  // Perspective
  const fov = 500;
  const depth = rz2 + camZoom * 3;
  if (depth < 0.1) return null;
  const scale = fov / depth;

  return {
    sx: canvas.width / 2 + rx * scale,
    sy: canvas.height / 2 - ry * scale,
    depth: depth,
    scale: scale
  };
}

function render() {
  requestAnimationFrame(render);

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  for (let i = -5; i <= 5; i++) {
    const p1 = project(i, 0, -5);
    const p2 = project(i, 0, 5);
    const p3 = project(-5, 0, i);
    const p4 = project(5, 0, i);
    if (p1 && p2) { ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy); ctx.stroke(); }
    if (p3 && p4) { ctx.beginPath(); ctx.moveTo(p3.sx, p3.sy); ctx.lineTo(p4.sx, p4.sy); ctx.stroke(); }
  }

  if (!positions || particleCount === 0) return;

  // Draw particles (sample if too many for canvas performance)
  const maxDraw = 20000;
  const step = particleCount > maxDraw ? Math.ceil(particleCount / maxDraw) : 1;

  for (let i = 0; i < particleCount; i += step) {
    const x = positions[i * 3];
    const y = positions[i * 3 + 1];
    const z = positions[i * 3 + 2];

    const p = project(x, y, z);
    if (!p) continue;

    // Color based on height
    const t = Math.min(Math.max(y / 4, 0), 1);
    const r = Math.floor(50 + t * 200);
    const g = Math.floor(120 + t * 135);
    const b = Math.floor(200 + (1 - t) * 55);
    const size = Math.max(1, 2 * p.scale / 100);

    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(p.sx - size/2, p.sy - size/2, size, size);
  }
}
render();

// ── WebSocket (same port as HTTP) ──
const wsUrl = `ws://${location.host}`;
let ws = null;
let frameCount = 0;
let fpsCount = 0;
let lastFpsTime = performance.now();

function connect() {
  document.getElementById('status').textContent = `Connecting to ${wsUrl}...`;
  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    document.getElementById('status').textContent = '🟢 Connected';
    document.getElementById('status').style.color = '#66bb6a';
  };

  ws.onmessage = (event) => {
    const buf = new DataView(event.data);
    const frameNum = buf.getUint32(0, true);
    const count = buf.getUint32(4, true);

    particleCount = count;
    positions = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) {
      positions[i] = buf.getFloat32(8 + i * 4, true);
    }

    frameCount = frameNum;
    fpsCount++;

    document.getElementById('count').textContent = count.toLocaleString();
    document.getElementById('frame').textContent = frameNum.toLocaleString();
  };

  ws.onclose = () => {
    document.getElementById('status').textContent = '⏹ Simulation ended';
    document.getElementById('status').style.color = '#aaa';
  };

  ws.onerror = () => {
    document.getElementById('status').textContent = '🔴 Disconnected';
    document.getElementById('status').style.color = '#ef5350';
    setTimeout(connect, 2000);
  };
}

connect();

// FPS counter
setInterval(() => {
  document.getElementById('fps').textContent = fpsCount;
  fpsCount = 0;
}, 1000);
</script>
</body>
</html>
